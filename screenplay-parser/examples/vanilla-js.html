<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenplay Parser - Vanilla JS Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; height: 200px; font-family: monospace; }
    button { padding: 0.5rem 1rem; margin: 0.5rem 0; cursor: pointer; }
    .element { padding: 4px 8px; margin: 2px 0; border-left: 3px solid #ccc; }
    .element.sceneHeading { border-color: #e74c3c; background: #fde8e8; }
    .element.character { border-color: #3498db; background: #e8f4fd; }
    .element.dialogue { border-color: #2ecc71; background: #e8fde8; }
    .element.action { border-color: #95a5a6; background: #f5f5f5; }
    .element.parenthetical { border-color: #9b59b6; background: #f3e8fd; }
    .element.transition { border-color: #e67e22; background: #fdf3e8; }
    .meta { color: #666; font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>Screenplay Parser Demo</h1>
  <p>Paste screenplay text below and click "Parse"</p>

  <textarea id="input" placeholder="Paste screenplay text here...">FADE IN:

INT. COFFEE SHOP - MORNING

Sarah sits at a table, stirring her coffee.

SARAH
I can't do this anymore.

JOHN (V.O.)
You don't have a choice.

CUT TO:

EXT. CITY STREET - DAY

Sarah walks briskly through the crowd.</textarea>

  <br>
  <button onclick="parseScript()">Parse Screenplay</button>
  <button onclick="clearResults()">Clear</button>

  <div id="output"></div>

  <script type="module">
    import { ScreenplayParser, InMemoryAdapter } from '../dist/screenplay-parser.esm.js';

    const parser = new ScreenplayParser({
      storage: new InMemoryAdapter(),
      enableLearning: false,
      enableClaudeMode: false,
      logLevel: 'info',
    });

    window.parseScript = async function() {
      const text = document.getElementById('input').value;
      const output = document.getElementById('output');

      try {
        const result = await parser.parseText(text);

        let html = `<h2>Parse Result</h2>`;
        html += `<p class="meta">Confidence: ${(result.confidence * 100).toFixed(1)}% | Elements: ${result.elements.length} | Time: ${result.duration}ms</p>`;
        html += `<p class="meta">Characters: ${result.characters.join(', ') || 'none'}</p>`;
        html += `<p class="meta">Scenes: ${result.scenes.length}</p>`;

        if (result.warnings.length > 0) {
          html += `<p style="color:orange">Warnings: ${result.warnings.join(', ')}</p>`;
        }

        html += `<h3>Elements</h3>`;
        for (const el of result.elements) {
          html += `<div class="element ${el.type}">`;
          html += `<strong>[${el.type}]</strong> ${el.text}`;
          html += `<span class="meta"> (${(el.confidence * 100).toFixed(0)}%)</span>`;
          if (el.flagged) html += ` <span style="color:red">⚠ ${el.flagReason}</span>`;
          html += `</div>`;
        }

        output.innerHTML = html;
      } catch (err) {
        output.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
      }
    };

    window.clearResults = function() {
      document.getElementById('output').innerHTML = '';
    };
  </script>
</body>
</html>
